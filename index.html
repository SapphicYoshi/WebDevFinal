<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flashcards">

    <nav class="top-nav">
        <div class="logo">Flashcards</div>
        <ul>
            <li>
                <a href="timer.html" class="nav-link-button">⏱ Timer</a>
            </li>
        </ul>
    </nav>

    <nav class="bottom-nav">
        <button type="button" id="buttonOne" class="nav-box">1</button>
        <button type="button" id="buttonTwo" class="nav-box">2</button>
        <button type="button" id="buttonThree" class="nav-box">3</button>
        <button type="button" id="buttonFour" class="nav-box">4</button>
        <button type="button" id="buttonFive" class="nav-box">5</button>
        <button type="button" id="buttonSix" class="nav-box">6</button>
        <button type="button" id="buttonSeven" class="nav-box">7</button>
        <button type="button" id="buttonEight" class="nav-box">8</button>
        <button type="button" id="buttonNine" class="nav-box">9</button>
    </nav>

    <div class="parent">
        <div class="card-wrap">
            <div id="div1" class="div1">
                <div class="card-face card-front">Word/Definition</div>
                <div class="card-face card-back"></div>
            </div>
        </div>
        <div class="div2">
            <button id="for" class="button direction-button">Reverse</button>
        </div>
        <div class="div3">
            <button id="rev" class="button direction-button">Forward</button>
        </div>
        <div class="div4">
            <button id="flip" class="button">Flip</button>
        </div>
    </div>

    <div class="content">
      <select id="deckOptions">
        <option value="option1">Deck 1</option>
        <option value="option2">Deck 2</option>
        <option value="option3">Deck 3</option>
        <option value="option4">Deck 4</option>
        <option value="option5">Deck 5</option>
        <option value="option6">Deck 6</option>
        <option value="option7">Deck 7</option>
        <option value="option8">Deck 8</option>
        <option value="option9">Deck 9</option>
      </select>

      <input id="front" placeholder="Front">
      <input id="back" placeholder="Back">

      <button id="yes">Yes</button>
    </div>

    <script src="js/main.js"></script>

</body>
</html>
