<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="logo">Pomodoro Timer</div>
        <div class="nav-actions">
            <div class="theme-selector">
                <label for="themeSelect">Theme</label>
                <select id="themeSelect">
                    <option value="wildflower">Wildflower Meadow</option>
                    <option value="mushroom">Mushroom Grove</option>
                    <option value="linen">Vintage Linen</option>
                    <option value="forest">Forest Nook</option>
                    <option value="lavender">Lavender Cottage</option>
                    <option value="midnight">Midnight Fern</option>
                    <option value="moonlit">Moonlit Cottage</option>
                </select>
            </div>
            <ul>
                <li><a href="index.html" class="nav-link-button">📇 Flashcards</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Pomodoro Timer</h1>
            <p class="subtitle">A cozy productivity companion</p>
        </header>

        <main>
            <section>
                <div class="timer-container">
                    <div class="session-type">
                        <span id="sessionType" class="session-label">Work Session</span>
                    </div>
                    <div class="timer-display">
                        <div class="timer-circle">
                            <span id="timeDisplay" class="time">25:00</span>
                        </div>
                    </div>

                    <div class="timer-controls">
                        <button id="startBtn" class="btn btn-primary">Start</button>
                        <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
                        <button id="resetBtn" class="btn btn-secondary">Reset</button>
                    </div>

                    <div class="settings">
                        <div class="setting-group">
                            <label for="workTime">Work Time (minutes):</label>
                            <input type="number" id="workTime" min="1" max="500" value="25">
                        </div>
                        <div class="setting-group">
                            <label for="breakTime">Break Time (minutes):</label>
                            <input type="number" id="breakTime" min="1" max="500" value="5">
                        </div>
                        <button id="updateSettingsBtn" class="btn btn-secondary">Update Settings</button>
                    </div>

                    <div class="progress-info">
                        <p>Sessions Completed: <span id="sessionsCompeted">0</span></p>
                    </div>

                    <div class="history">
                        <h2>Session History</h2>
                        <ul id="sessionHistory"></ul>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
